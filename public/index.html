<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Мафия</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


<h1>🎭 Мафия</h1>



<!-- ======================
     Вход игрока
====================== -->

<div id="login" class="box">

    <h2>Введите ник</h2>

    <input 
        id="name"
        placeholder="Ваш ник"
    >

    <button id="join">
        Войти
    </button>

</div>





<!-- ======================
     Игра игрока
====================== -->

<div id="game" class="box" style="display:none">


    <h2>
        Игрок:
        <span id="playerName"></span>
    </h2>



    <div id="roleBox"></div>



    <div id="actionBox"></div>



    <div id="voiceText"></div>



    <div id="timer"></div>


</div>





<!-- ======================
     Админ
====================== -->

<div id="adminPanel" class="box" style="display:none">


    <h2>
        👑 Администратор
    </h2>



    <button id="startGame">
        Начать игру
    </button>


    <button id="startNight">
        Начало ночи
    </button>


    <button id="endGame">
        Закончить игру
    </button>

    <button id="shuffleBtn">
    Перемешать игроков
</button>

<button id="musicBtn">
    ▶ Музыка
</button>

<button id="nextTrackBtn">⏭ Следующий трек</button>

<label>
    🔊
    <input
        id="volumeSlider"
        type="range"
        min="0"
        max="100"
        value="20">
</label>




    <h3>
        Игроки:
    </h3>



    <ul id="players"></ul>


</div>



<audio id="bgMusic">
</audio>

<script src="/socket.io/socket.io.js"></script>

<script src="script.js"></script>


</body>

</html>
