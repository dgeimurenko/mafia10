<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мафия</title>

    <link rel="stylesheet" href="style.css">

    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div id="login">

    <h1>Мафия</h1>

    <input
        type="text"
        id="name"
        placeholder="Введите ник"
        maxlength="20"
    >

    <button id="join">
        Войти
    </button>

</div>


<div id="game" style="display:none;">

    <h2 id="playerName"></h2>

    <div id="roleBox"></div>

    <div id="timer"></div>

    <div id="sheriffBox" style="display:none;">
        <h2>Вы можете осмотреть город</h2>
    </div>

    <div id="voiceText"></div>

</div>


<div id="adminPanel" style="display:none;">

    <h2>Администратор</h2>

    <button id="startGame">
        Начать игру
    </button>

    <h3>Игроки</h3>

    <ul id="players"></ul>

</div>


<script src="script.js"></script>

</body>
</html>
